services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "8585:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
      - db-data:/data
    environment:
      DATABASE_URL: sqlite:///data/email.db
      HOST: 0.0.0.0
      PORT: "3000"
      FRONTEND_DIST: /app/crates/email-server/static
      GOOGLE_REDIRECT_URI: http://localhost:8585/api/v1/auth/gmail/callback
      MICROSOFT_REDIRECT_URI: http://localhost:8585/api/v1/auth/microsoft/callback
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    restart: unless-stopped

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
  db-data:
  node-modules:
