# Builds a Windows MSI installer and uploads it as a Forgejo release asset.
# Runs natively on the Windows agent (platform=windows/amd64) via the local backend.
#
# Required tooling on the runner machine (one-time setup):
#   - Rust (rustup) with x86_64-pc-windows-msvc target
#   - Visual Studio Build Tools 2022 (VCTools workload) — for MSVC linker
#   - Node.js LTS
#   - .NET SDK 8 + WiX v5 (`dotnet tool install --global wix --version 5.0.2`)
#
# Silent install:    msiexec /i email-rs-<ver>-installer.msi /qn
# Silent uninstall:  msiexec /x {D9E7F2A4-8B1C-4E3D-9F5A-6C2D8E4F1B9A} /qn
when:
  - event: tag
    ref: refs/tags/v*
  - event: manual

labels:
  platform: windows/amd64

# Woodpecker's default clone uses a Docker plugin image — doesn't work with local
# backend on Windows (GCM prompts for interactive auth). Override with a PS clone
# that embeds the CI-provided token into the HTTPS URL.
clone:
  - name: clone
    image: local
    commands:
      - |
        $ErrorActionPreference = 'Stop'
        $env:GIT_TERMINAL_PROMPT = '0'
        $env:GCM_INTERACTIVE      = 'never'
        $url = $env:CI_REPO_CLONE_URL -replace '^https://',
               "https://$($env:CI_NETRC_USERNAME):$($env:CI_NETRC_PASSWORD)@"
        git init --initial-branch=main | Out-Null
        git config --global --replace-all safe.directory '*'
        git config --local credential.helper ''
        git remote add origin $url
        git fetch --depth=1 --no-tags origin $env:CI_COMMIT_SHA
        git checkout --detach FETCH_HEAD

steps:
  # ── Create/refresh Forgejo release before uploading ──────────────────────────
  - name: create-release
    image: local
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - |
        $ErrorActionPreference = 'Stop'
        $headers = @{ Authorization = "token $env:FORGEJO_TOKEN" }
        if ($env:CI_COMMIT_TAG) {
          $tag   = $env:CI_COMMIT_TAG
          $title = $env:CI_COMMIT_TAG
          $body  = "Release $env:CI_COMMIT_TAG"
          $pre   = $false
        } else {
          $hash  = $env:CI_COMMIT_SHA.Substring(0, 7)
          $tag   = "latest"
          $title = "Latest build ($hash)"
          $body  = "Rolling build from $env:CI_COMMIT_SHA"
          $pre   = $true
        }
        $base = "https://repo.indexarr.net/api/v1/repos/$env:CI_REPO"
        try {
          $existing = Invoke-RestMethod -Headers $headers -Uri "$base/releases/tags/$tag"
          Invoke-RestMethod -Method Delete -Headers $headers -Uri "$base/releases/$($existing.id)"
        } catch {}
        if ($tag -eq "latest") {
          try { Invoke-RestMethod -Method Delete -Headers $headers -Uri "$base/tags/latest" } catch {}
        }
        $payload = @{
          tag_name = $tag; target_commitish = $env:CI_COMMIT_SHA
          name = $title; body = $body; draft = $false; prerelease = $pre
        } | ConvertTo-Json
        Invoke-RestMethod -Method Post -Headers $headers -ContentType "application/json" `
          -Uri "$base/releases" -Body $payload | Out-Null
        Write-Host "Release '$tag' created."

  # ── Build frontend + Rust binary + MSI ───────────────────────────────────────
  - name: build-msi
    image: local
    depends_on: [create-release]
    commands:
      - |
        $ErrorActionPreference = 'Stop'

        # Strip [patch] sections (local dev overrides; registry packages in CI)
        foreach ($file in @("Cargo.toml", "crates\email-server\Cargo.toml")) {
          if (-not (Test-Path $file)) { continue }
          $out = @(); $skip = $false
          foreach ($l in (Get-Content $file)) {
            if ($l -match '^\[patch')        { $skip = $true;  continue }
            if ($skip -and $l -match '^\[')  { $skip = $false }
            if ($skip -and $l -match '^\s*$'){ $skip = $false; continue }
            if (-not $skip) { $out += $l }
          }
          $out | Set-Content $file
        }

        # React frontend
        Push-Location frontend
        npm ci
        if ($LASTEXITCODE -ne 0) { throw "npm ci failed" }
        npx vite build --outDir ..\staging\static --emptyOutDir
        if ($LASTEXITCODE -ne 0) { throw "vite build failed" }
        Pop-Location

        # Rust server (native Windows MSVC build)
        rustup target add x86_64-pc-windows-msvc
        cargo build --release --target x86_64-pc-windows-msvc -p email-server
        if ($LASTEXITCODE -ne 0) { throw "cargo build failed" }
        Copy-Item target\x86_64-pc-windows-msvc\release\email-server.exe staging\ -Force

        # Version — strip leading v from tag, fallback for manual runs
        $raw = if ($env:CI_COMMIT_TAG) { $env:CI_COMMIT_TAG } else { "v0.0.0" }
        $version = $raw -replace '^v', ''

        # WiX build (Util extension provides InternetShortcut)
        wix extension add -g WixToolset.Util.wixext
        wix build `
          -d "AppVersion=$version" `
          -d "StagingDir=$((Get-Location).Path)\staging" `
          -arch x64 `
          -ext WixToolset.Util.wixext `
          .woodpecker\windows\installer.wxs `
          -o "email-rs-$version-installer.msi"
        if ($LASTEXITCODE -ne 0) { throw "wix build failed" }
        Write-Host "Built email-rs-$version-installer.msi"

  # ── Upload .msi to the Forgejo release ───────────────────────────────────────
  - name: upload-msi
    image: local
    depends_on: [build-msi]
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - |
        $ErrorActionPreference = 'Stop'
        $tag = if ($env:CI_COMMIT_TAG) { $env:CI_COMMIT_TAG } else { "latest" }
        $headers = @{ Authorization = "token $env:FORGEJO_TOKEN" }
        $rel = Invoke-RestMethod -Headers $headers `
          -Uri "https://repo.indexarr.net/api/v1/repos/$env:CI_REPO/releases/tags/$tag"
        Get-ChildItem -Filter "email-rs-*-installer.msi" | ForEach-Object {
          Write-Host "Uploading $($_.Name)"
          $url = "https://repo.indexarr.net/api/v1/repos/$env:CI_REPO/releases/$($rel.id)/assets?name=$($_.Name)"
          & curl.exe -sf -X POST `
            -H "Authorization: token $env:FORGEJO_TOKEN" `
            -F "attachment=@$($_.FullName)" $url
          if ($LASTEXITCODE -ne 0) { throw "upload failed for $($_.Name)" }
        }

  # ── Notifications ────────────────────────────────────────────────────────────
  - name: discord-success
    image: local
    depends_on: [upload-msi]
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        $hash = $env:CI_COMMIT_SHA.Substring(0, 7)
        $ts = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
        $payload = @{
          embeds = @(@{
            title = "email-rs Windows MSI built"
            description = "**$env:CI_REPO** - [$hash]($env:CI_REPO_URL/commit/$env:CI_COMMIT_SHA)"
            color = 5025616
            footer = @{ text = "$env:CI_REPO - $env:CI_COMMIT_AUTHOR" }
            timestamp = $ts
          })
        } | ConvertTo-Json -Depth 5
        try {
          Invoke-RestMethod -Method Post -Uri $env:DISCORD_WEBHOOK_URL `
            -ContentType "application/json" -Body $payload
        } catch {}
    when:
      - status: [success]

  - name: discord-failure
    image: local
    depends_on: [build-msi]
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        $hash = $env:CI_COMMIT_SHA.Substring(0, 7)
        $ts = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
        $payload = @{
          embeds = @(@{
            title = "email-rs Windows build failed"
            description = "**$env:CI_REPO** - [$hash]($env:CI_REPO_URL/commit/$env:CI_COMMIT_SHA)"
            color = 15548997
            footer = @{ text = "$env:CI_REPO - $env:CI_COMMIT_AUTHOR" }
            timestamp = $ts
          })
        } | ConvertTo-Json -Depth 5
        try {
          Invoke-RestMethod -Method Post -Uri $env:DISCORD_WEBHOOK_URL `
            -ContentType "application/json" -Body $payload
        } catch {}
    when:
      - status: [failure]
