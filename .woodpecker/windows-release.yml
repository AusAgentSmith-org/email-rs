# Builds a Windows .msi installer and uploads it as a Forgejo release asset.
# Triggers: version tags (v*) and manual runs — quality checks run separately
# via Forgejo Actions CI on every push.
#
# The installer is a proper Windows Installer (.msi) built with WiX v5,
# following Windows Installer best practices:
#   - MajorUpgrade: previous versions are cleanly removed before installing new one
#   - Silent install supported via standard /qn MSI flag
#   - Rollback: if service setup fails, the rollback CA removes the service
#   - Data preserved: C:\ProgramData\email-rs\ is kept on uninstall
when:
  - event: tag
    ref: refs/tags/v*
  - event: manual

variables:
  - &rust_image 'rust:1.88-bookworm'

steps:
  # ── Create Forgejo release before builds start uploading ─────────────────
  - name: create-release
    image: alpine:3.20
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - apk add --no-cache curl jq
      - |
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          TAG="$CI_COMMIT_TAG"
          TITLE="$CI_COMMIT_TAG"
          BODY="Release $CI_COMMIT_TAG"
          PRERELEASE=false
        else
          HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
          TAG="latest"
          TITLE="Latest build ($HASH)"
          BODY="Rolling build from $CI_COMMIT_SHA on branch ${CI_COMMIT_BRANCH:-main}"
          PRERELEASE=true
        fi

        EXISTING_ID=$(curl -sf -H "Authorization: token $FORGEJO_TOKEN" \
          "https://repo.indexarr.net/api/v1/repos/$CI_REPO/releases/tags/$TAG" \
          | jq -r '.id // empty' || true)
        [ -n "$EXISTING_ID" ] && curl -sf -X DELETE -H "Authorization: token $FORGEJO_TOKEN" \
          "https://repo.indexarr.net/api/v1/repos/$CI_REPO/releases/$EXISTING_ID" || true
        [ "$TAG" = "latest" ] && curl -sf -X DELETE -H "Authorization: token $FORGEJO_TOKEN" \
          "https://repo.indexarr.net/api/v1/repos/$CI_REPO/tags/latest" || true

        curl -sf -X POST \
          -H "Authorization: token $FORGEJO_TOKEN" \
          -H "Content-Type: application/json" \
          "https://repo.indexarr.net/api/v1/repos/$CI_REPO/releases" \
          -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"$CI_COMMIT_SHA\",\"name\":\"$TITLE\",\"body\":\"$BODY\",\"draft\":false,\"prerelease\":$PRERELEASE}"
        echo "Release $TAG created."

  # ── Windows .msi installer (cross-compiled from Linux) ───────────────────
  - name: build-windows
    image: *rust_image
    depends_on: [create-release]
    environment:
      CI: "true"
      XWIN_CACHE_DIR: /root/.cache/xwin
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - apt-get update -qq
      - |
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          lld clang llvm curl wget jq unzip pkg-config libssl-dev
      # Add Microsoft package feed (dotnet-sdk-8.0 not in Debian Bookworm default repos)
      - |
        wget -q https://packages.microsoft.com/config/debian/12/packages-microsoft-prod.deb
        dpkg -i packages-microsoft-prod.deb && rm packages-microsoft-prod.deb
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends dotnet-sdk-8.0
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs

      # Strip local [patch] overrides (don't exist in CI)
      - sed -i '/^\[patch\]/,/^$/d' Cargo.toml || true
      - sed -i '/^\[patch\]/,/^$/d' crates/email-server/Cargo.toml || true

      # Install WiX v5 (last free version — v6+ requires OSMF fee; v5 supports Linux)
      - dotnet tool install --global wix --version 5.0.2
      - export PATH="$PATH:$HOME/.dotnet/tools"
      - wix extension add WixToolset.UI.wixext/5.0.2
      - wix extension add WixToolset.Util.wixext/5.0.2

      # Build React frontend
      - cd frontend && npm ci && npx vite build --outDir /tmp/email-rs-static --emptyOutDir && cd ..

      # Cross-compile Rust binary for Windows (MSVC target via cargo-xwin)
      - rustup target add x86_64-pc-windows-msvc
      - cargo install --locked cargo-xwin --version 0.19.2
      - cargo xwin build --release --target x86_64-pc-windows-msvc -p email-server

      # Stage all installer inputs
      - mkdir -p .nsis-staging
      - cp target/x86_64-pc-windows-msvc/release/email-server.exe .nsis-staging/
      - cp -r /tmp/email-rs-static .nsis-staging/static
      # Download WinSW (Windows service wrapper from GitHub — more reliable than nssm.cc)
      # Renamed to email-rs-svc.exe; WinSW reads config from same-named .xml at install time
      - wget -q https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe -O .nsis-staging/email-rs-svc.exe

      # Generate WiX fragment for static files, then build the .msi
      - |
        RAW="${CI_COMMIT_TAG:-v0.0.0}"
        VERSION=$(echo "$RAW" | sed 's/^v//')
        STAGING="$(pwd)/.nsis-staging"
        SCRIPTS="$(pwd)/.woodpecker/windows"

        python3 "$SCRIPTS/harvest-static.py" "$STAGING" > static-files.wxs

        wix build \
          .woodpecker/windows/installer.wxs \
          static-files.wxs \
          -ext WixToolset.UI.wixext \
          -ext WixToolset.Util.wixext \
          -d AppVersion="$VERSION" \
          -d Staging="$STAGING" \
          -d Scripts="$SCRIPTS" \
          -out "email-rs-${VERSION}.msi"

      # Upload .msi to the Forgejo release
      - |
        TAG="${CI_COMMIT_TAG:-latest}"
        REL_ID=$(curl -sf -H "Authorization: token $FORGEJO_TOKEN" \
          "https://repo.indexarr.net/api/v1/repos/$CI_REPO/releases/tags/$TAG" \
          | jq -r '.id')
        find . -maxdepth 1 -name 'email-rs-*.msi' | while read f; do
          echo "Uploading $(basename "$f")"
          curl -sf -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@$f" \
            "https://repo.indexarr.net/api/v1/repos/$CI_REPO/releases/$REL_ID/assets?name=$(basename "$f")"
        done

  # ── Notifications ─────────────────────────────────────────────────────────
  - name: discord-success
    image: alpine/curl
    depends_on: [build-windows]
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
        curl -sf -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"email-rs Windows installer built\",\"description\":\"**$CI_REPO** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",\"color\":5025616,\"footer\":{\"text\":\"$CI_REPO • $CI_COMMIT_AUTHOR\"},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
          "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl
    depends_on: [build-windows]
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
        curl -sf -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"email-rs Windows build failed\",\"description\":\"**$CI_REPO** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",\"color\":15548997,\"footer\":{\"text\":\"$CI_REPO • $CI_COMMIT_AUTHOR\"},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
          "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
